# Nome da nossa automação
name: Deploy do so.site para o GitHub Pages

# Quando é que isto deve ser executado?
# Sempre que houver um "push" (envio de código) para a branch "main"
on:
  push:
    branches: ["main"] # Se a tua branch se chamar "master", muda aqui!

# Permissões necessárias para o GitHub Actions poder publicar o site
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que não corremos vários deploys ao mesmo tempo
concurrency:
  group: "pages"
  cancel-in-progress: true

# A lista de tarefas que o robô do GitHub vai executar
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest # O sistema operativo do servidor virtual

    steps:
      # Passo 1: Fazer download do teu código para o servidor virtual
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Instalar o Node.js (necessário para rodar projetos React)
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Versão estável do Node
          cache: 'npm'     # Muda para 'yarn' se usares yarn

      # Passo 3: Instalar as bibliotecas do projeto (Tailwind, React, etc)
      - name: Instalar dependências
        run: npm install   # Muda para 'yarn install' se usares yarn

      # Passo 4: Fazer o build (transformar React em HTML/CSS/JS puro)
      - name: Build do projeto
        run: npm run build # Muda para 'yarn build' se usares yarn

      # Passo 5: Preparar o GitHub Pages
      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v4

      # Passo 6: Pegar na pasta "dist" (resultado do build) e preparar para upload
      - name: Upload do artefato (pasta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # O Vite guarda o build nesta pasta por padrão

      # Passo 7: Finalmente, publicar no GitHub Pages!
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4