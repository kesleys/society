# Documentação: Nome da nossa automação
name: Deploy do so.site para o GitHub Pages

# Documentação: Aciona o deploy sempre que houver um push na branch main
on:
  push:
    branches: ["main"]

# Documentação: Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Documentação: Instalação do Node.js atualizada para a versão 24 (resolve o aviso)
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # Agora vai funcionar porque criámos o package-lock.json!

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do artefato (pasta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4